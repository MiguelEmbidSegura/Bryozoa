services:
  db:
    image: postgres:16-alpine
    container_name: bryozoo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bryozoo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bryozoo-postgres:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bryozoo-app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bryozoo?schema=public
      APP_URL: http://localhost:3000
      AUTH_SECRET: local-development-secret-change-me
      ADMIN_SEED_EMAIL: admin@bryozoo.local
      ADMIN_SEED_PASSWORD: ChangeMe123!
      NEXT_PUBLIC_MAP_TILE_URL: https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png
      NEXT_PUBLIC_MAP_ATTRIBUTION: "&copy; OpenStreetMap contributors"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: >
      sh -c "npm install &&
      npm run prisma:generate &&
      npm run prisma:migrate &&
      npm run db:seed &&
      npm run dev"

volumes:
  bryozoo-postgres:
